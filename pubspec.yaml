name: wear_os_scrollbar
description: A Flutter plugin to show Material 3 Expressive scroll indicator for WearOS with customizable haptic response.
version: 0.0.1
homepage: https://github.com/Piero16301/wear_os_scrollbar

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.pmorales.wear_os_scrollbar
        pluginClass: WearOsScrollbarPlugin

topics:
  - wearos
  - smartwatch
  - ui
  - scrollbar
  - haptic
